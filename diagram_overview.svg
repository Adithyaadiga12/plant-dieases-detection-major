<svg width="1200" height="580" viewBox="0 0 1200 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,Helvetica,sans-serif">

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#757575"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="580" fill="#F5F6FA"/>

  <!-- ═══ HEADER ═══ -->
  <rect x="0" y="0" width="1200" height="64" fill="#1B5E20"/>
  <text x="600" y="28" text-anchor="middle" fill="white" font-size="22" font-weight="bold" letter-spacing="0.3">AgroVision AI</text>
  <text x="600" y="51" text-anchor="middle" fill="#A5D6A7" font-size="13">AI-Powered Plant Disease Detection  ·  Offline  ·  Multilingual  ·  Android App</text>

  <!-- ═══ SECTION 1: USER WORKFLOW ═══ -->
  <text x="40" y="85" fill="#546E7A" font-size="11" font-weight="bold" letter-spacing="1.8">HOW IT WORKS  —  USER WORKFLOW</text>

  <!-- Step 1 -->
  <rect x="40" y="96" width="210" height="100" rx="10" fill="white" stroke="#1565C0" stroke-width="2"/>
  <rect x="40" y="96" width="210" height="28" rx="10" fill="#1565C0"/>
  <rect x="40" y="110" width="210" height="14" fill="#1565C0"/>
  <text x="145" y="116" text-anchor="middle" fill="white" font-size="11" font-weight="bold">STEP 1</text>
  <text x="145" y="148" text-anchor="middle" font-size="26">&#x1F4F7;</text>
  <text x="145" y="168" text-anchor="middle" fill="#0D47A1" font-size="12" font-weight="bold">Farmer Takes Photo</text>
  <text x="145" y="184" text-anchor="middle" fill="#757575" font-size="11">Camera or gallery</text>

  <!-- Arrow 1 -->
  <line x1="252" y1="146" x2="308" y2="146" stroke="#9E9E9E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="310" y="96" width="210" height="100" rx="10" fill="white" stroke="#F57C00" stroke-width="2"/>
  <rect x="310" y="96" width="210" height="28" rx="10" fill="#F57C00"/>
  <rect x="310" y="110" width="210" height="14" fill="#F57C00"/>
  <text x="415" y="116" text-anchor="middle" fill="white" font-size="11" font-weight="bold">STEP 2</text>
  <text x="415" y="148" text-anchor="middle" font-size="26">&#x1F50D;</text>
  <text x="415" y="168" text-anchor="middle" fill="#E65100" font-size="12" font-weight="bold">Quality Check</text>
  <text x="415" y="184" text-anchor="middle" fill="#757575" font-size="11">Blur · brightness · leaf</text>

  <!-- Arrow 2 -->
  <line x1="522" y1="146" x2="578" y2="146" stroke="#9E9E9E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="580" y="96" width="210" height="100" rx="10" fill="white" stroke="#2E7D32" stroke-width="2"/>
  <rect x="580" y="96" width="210" height="28" rx="10" fill="#2E7D32"/>
  <rect x="580" y="110" width="210" height="14" fill="#2E7D32"/>
  <text x="685" y="116" text-anchor="middle" fill="white" font-size="11" font-weight="bold">STEP 3</text>
  <text x="685" y="148" text-anchor="middle" font-size="26">&#x1F9E0;</text>
  <text x="685" y="168" text-anchor="middle" fill="#1B5E20" font-size="12" font-weight="bold">AI Identifies Disease</text>
  <text x="685" y="184" text-anchor="middle" fill="#757575" font-size="11">On-device, no internet</text>

  <!-- Arrow 3 -->
  <line x1="792" y1="146" x2="848" y2="146" stroke="#9E9E9E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="850" y="96" width="310" height="100" rx="10" fill="white" stroke="#6A1B9A" stroke-width="2"/>
  <rect x="850" y="96" width="310" height="28" rx="10" fill="#6A1B9A"/>
  <rect x="850" y="110" width="310" height="14" fill="#6A1B9A"/>
  <text x="1005" y="116" text-anchor="middle" fill="white" font-size="11" font-weight="bold">STEP 4</text>
  <text x="1005" y="148" text-anchor="middle" font-size="26">&#x1F4CB;</text>
  <text x="1005" y="168" text-anchor="middle" fill="#4A148C" font-size="12" font-weight="bold">Report + Voice Output</text>
  <text x="1005" y="184" text-anchor="middle" fill="#757575" font-size="11">Disease name · remedy · read aloud</text>

  <!-- ═══ SECTION 2: AI PIPELINE ═══ -->
  <text x="40" y="220" fill="#546E7A" font-size="11" font-weight="bold" letter-spacing="1.8">INSIDE THE APP  —  AI PIPELINE</text>

  <!-- Dashed outer box -->
  <rect x="40" y="230" width="1120" height="148" rx="12" fill="white" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="58" y="248" fill="#B0BEC5" font-size="10" font-style="italic">TFLite on-device inference</text>

  <!-- Block A: Preprocessing -->
  <rect x="58" y="254" width="205" height="110" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="160" y="275" text-anchor="middle" fill="#0D47A1" font-size="12" font-weight="bold">Pre-processing</text>
  <line x1="70" y1="282" x2="250" y2="282" stroke="#90CAF9" stroke-width="1"/>
  <text x="160" y="300" text-anchor="middle" fill="#1565C0" font-size="11">Resize to 224 x 224 px</text>
  <text x="160" y="317" text-anchor="middle" fill="#1565C0" font-size="11">Normalize each pixel</text>
  <text x="160" y="334" text-anchor="middle" fill="#1565C0" font-size="11">to range  [−1 , +1]</text>
  <text x="160" y="351" text-anchor="middle" fill="#1565C0" font-size="10">(must match training)</text>

  <!-- Arrow -->
  <line x1="265" y1="309" x2="304" y2="309" stroke="#9E9E9E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Block B: EfficientNet -->
  <rect x="306" y="254" width="195" height="110" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="403" y="275" text-anchor="middle" fill="#1B5E20" font-size="12" font-weight="bold">EfficientNetB0</text>
  <line x1="318" y1="282" x2="489" y2="282" stroke="#A5D6A7" stroke-width="1"/>
  <text x="403" y="300" text-anchor="middle" fill="#2E7D32" font-size="11">Backbone 1</text>
  <text x="403" y="317" text-anchor="middle" fill="#2E7D32" font-size="11">5.3 M parameters</text>
  <text x="403" y="334" text-anchor="middle" fill="#2E7D32" font-size="11">Extracts 1,280</text>
  <text x="403" y="351" text-anchor="middle" fill="#2E7D32" font-size="11">visual features</text>

  <!-- Plus sign -->
  <text x="526" y="317" text-anchor="middle" fill="#37474F" font-size="24" font-weight="bold">+</text>

  <!-- Block C: MobileNet -->
  <rect x="546" y="254" width="195" height="110" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="643" y="275" text-anchor="middle" fill="#4A148C" font-size="12" font-weight="bold">MobileNetV2</text>
  <line x1="558" y1="282" x2="729" y2="282" stroke="#CE93D8" stroke-width="1"/>
  <text x="643" y="300" text-anchor="middle" fill="#7B1FA2" font-size="11">Backbone 2</text>
  <text x="643" y="317" text-anchor="middle" fill="#7B1FA2" font-size="11">3.4 M parameters</text>
  <text x="643" y="334" text-anchor="middle" fill="#7B1FA2" font-size="11">Extracts 1,280</text>
  <text x="643" y="351" text-anchor="middle" fill="#7B1FA2" font-size="11">visual features</text>

  <!-- Arrow -->
  <line x1="743" y1="309" x2="782" y2="309" stroke="#9E9E9E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Block D: Combine + Classify -->
  <rect x="784" y="254" width="185" height="110" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="876" y="272" text-anchor="middle" fill="#BF360C" font-size="11" font-weight="bold">Combine + Classify</text>
  <line x1="796" y1="280" x2="957" y2="280" stroke="#FFCC80" stroke-width="1"/>
  <text x="876" y="298" text-anchor="middle" fill="#E65100" font-size="11">Concatenate features</text>
  <text x="876" y="314" text-anchor="middle" fill="#E65100" font-size="11">1,280+1,280=2,560</text>
  <text x="876" y="330" text-anchor="middle" fill="#E65100" font-size="11">Dense 512 → 256</text>
  <text x="876" y="347" text-anchor="middle" fill="#E65100" font-size="11">Dropout layers</text>

  <!-- Arrow -->
  <line x1="971" y1="309" x2="1010" y2="309" stroke="#9E9E9E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Block E: Output -->
  <rect x="1012" y="254" width="132" height="110" rx="8" fill="#EDE7F6" stroke="#4527A0" stroke-width="1.5"/>
  <text x="1078" y="275" text-anchor="middle" fill="#311B92" font-size="12" font-weight="bold">Output</text>
  <line x1="1024" y1="282" x2="1132" y2="282" stroke="#B39DDB" stroke-width="1"/>
  <text x="1078" y="300" text-anchor="middle" fill="#4527A0" font-size="11">38 classes</text>
  <text x="1078" y="317" text-anchor="middle" fill="#4527A0" font-size="11">Softmax</text>
  <text x="1078" y="334" text-anchor="middle" fill="#4527A0" font-size="11">Confidence</text>
  <text x="1078" y="351" text-anchor="middle" fill="#4527A0" font-size="11">score %</text>

  <!-- ═══ SECTION 3: KEY FEATURES ═══ -->
  <text x="40" y="408" fill="#546E7A" font-size="11" font-weight="bold" letter-spacing="1.8">KEY FEATURES</text>

  <!-- 6 feature boxes, each 183 wide, 8px gap -->
  <rect x="40"  y="418" width="183" height="56" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="131" y="440" text-anchor="middle" fill="#1B5E20" font-size="12" font-weight="bold">38 Disease Classes</text>
  <text x="131" y="456" text-anchor="middle" fill="#388E3C" font-size="11">14 crop species covered</text>
  <text x="131" y="469" text-anchor="middle" fill="#388E3C" font-size="11">87,848 training images</text>

  <rect x="231" y="418" width="183" height="56" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="322" y="440" text-anchor="middle" fill="#0D47A1" font-size="12" font-weight="bold">98.3% Accuracy</text>
  <text x="322" y="456" text-anchor="middle" fill="#1565C0" font-size="11">Tested on 8,785 images</text>
  <text x="322" y="469" text-anchor="middle" fill="#1565C0" font-size="11">PlantVillage benchmark</text>

  <rect x="422" y="418" width="183" height="56" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="513" y="440" text-anchor="middle" fill="#E65100" font-size="12" font-weight="bold">100% Offline</text>
  <text x="513" y="456" text-anchor="middle" fill="#BF360C" font-size="11">No internet required</text>
  <text x="513" y="469" text-anchor="middle" fill="#BF360C" font-size="11">Works in rural areas</text>

  <rect x="613" y="418" width="183" height="56" rx="8" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.5"/>
  <text x="704" y="440" text-anchor="middle" fill="#BF360C" font-size="12" font-weight="bold">5 Languages</text>
  <text x="704" y="456" text-anchor="middle" fill="#E65100" font-size="11">EN · KN · HI · TA · TE</text>
  <text x="704" y="469" text-anchor="middle" fill="#E65100" font-size="11">Full UI + voice output</text>

  <rect x="804" y="418" width="183" height="56" rx="8" fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="895" y="440" text-anchor="middle" fill="#4A148C" font-size="12" font-weight="bold">Voice Output (TTS)</text>
  <text x="895" y="456" text-anchor="middle" fill="#6A1B9A" font-size="11">Reads result aloud</text>
  <text x="895" y="469" text-anchor="middle" fill="#6A1B9A" font-size="11">in farmer's language</text>

  <rect x="995" y="418" width="165" height="56" rx="8" fill="#FCE4EC" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="1077" y="440" text-anchor="middle" fill="#880E4F" font-size="12" font-weight="bold">14.8 MB Model</text>
  <text x="1077" y="456" text-anchor="middle" fill="#C62828" font-size="11">Fits on any phone</text>
  <text x="1077" y="469" text-anchor="middle" fill="#C62828" font-size="11">Float16 quantized</text>

  <!-- ═══ FOOTER ═══ -->
  <rect x="0" y="492" width="1200" height="88" fill="#263238"/>
  <text x="600" y="514" text-anchor="middle" fill="#78909C" font-size="10" font-weight="bold" letter-spacing="1.5">TECHNOLOGY STACK</text>

  <rect x="62"   y="522" width="108" height="22" rx="11" fill="#1565C0"/>
  <text x="116"  y="537" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Flutter 3.41</text>

  <rect x="178"  y="522" width="104" height="22" rx="11" fill="#2E7D32"/>
  <text x="230"  y="537" text-anchor="middle" fill="white" font-size="10" font-weight="bold">TFLite 0.12</text>

  <rect x="290"  y="522" width="126" height="22" rx="11" fill="#4527A0"/>
  <text x="353"  y="537" text-anchor="middle" fill="white" font-size="10" font-weight="bold">EfficientNetB0</text>

  <rect x="424"  y="522" width="118" height="22" rx="11" fill="#6A1B9A"/>
  <text x="483"  y="537" text-anchor="middle" fill="white" font-size="10" font-weight="bold">MobileNetV2</text>

  <rect x="550"  y="522" width="112" height="22" rx="11" fill="#00695C"/>
  <text x="606"  y="537" text-anchor="middle" fill="white" font-size="10" font-weight="bold">TF / Keras 3</text>

  <rect x="670"  y="522" width="118" height="22" rx="11" fill="#E65100"/>
  <text x="729"  y="537" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Hive + SQLite</text>

  <rect x="796"  y="522" width="120" height="22" rx="11" fill="#B71C1C"/>
  <text x="856"  y="537" text-anchor="middle" fill="white" font-size="10" font-weight="bold">PlantVillage</text>

  <rect x="924"  y="522" width="92"  height="22" rx="11" fill="#37474F"/>
  <text x="970"  y="537" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Dart 3.11</text>

  <rect x="1024" y="522" width="130" height="22" rx="11" fill="#4E342E"/>
  <text x="1089" y="537" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Android API 21+</text>

  <text x="600" y="565" text-anchor="middle" fill="#546E7A" font-size="10">
    AgroVision AI  ·  Plant Disease Detection using Deep Learning  ·  EfficientNetB0 + MobileNetV2 Dual Backbone  ·  38 Classes  ·  Offline Android App
  </text>
</svg>
